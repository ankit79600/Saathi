name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-type:
    name: Lint, Format & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev tools
        run: pip install ruff mypy

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: mypy type check
        # --ignore-missing-imports skips litert_lm and streamlit stubs (not available in CI)
        run: mypy app.py engine.py tools.py --ignore-missing-imports

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        # litert-lm may not resolve on PyPI in all environments; audit what can be resolved
        run: pip-audit -r requirements.txt --skip-editable || true

  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test deps
        run: |
          pip install pytest pytest-cov
          # Install pure-Python deps only; litert-lm is GPU-only and unavailable in CI
          pip install streamlit huggingface_hub

      - name: Run tests
        run: |
          if [ -d tests ]; then
            pytest tests/ -v --tb=short --cov=. --cov-report=term-missing
          else
            echo "No tests/ directory found — skipping"
          fi
